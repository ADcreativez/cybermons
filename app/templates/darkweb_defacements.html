{% extends 'base.html' %}

{% block content %}
<div class="scrollable-content">
    <div class="inventory-container" style="max-width: none;">
        <div class="panel-header"
            style="margin-bottom: 25px; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 10px;">
            <div>
                <h2 style="font-family: var(--font-mono); color: var(--accent-color); margin: 0;">
                    <i class="fa-solid fa-bug"></i> DEFACEMENT VICTIMS
                </h2>
                <div
                    style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 5px; font-family: var(--font-mono);">
                    GLOBAL CYBER VANDALISM MIRRORS
                </div>
            </div>
            <button onclick="syncDefacements()" id="sync-btn" class="btn btn-add"
                style="font-size: 0.75rem; padding: 8px 16px;">
                <i class="fa-solid fa-rotate" id="sync-icon"></i> SYNC MIRRORS
            </button>
        </div>

        <div id="sync-status"
            style="display:none; padding: 10px 15px; background: rgba(0,255,204,0.08); border: 1px solid rgba(0,255,204,0.2); border-radius: 4px; margin-bottom: 15px; font-family: var(--font-mono); font-size: 0.8rem; color: var(--accent-color);">
        </div>

        <div class="settings-section">
            <div
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 12px;">
                <input type="text" id="defacement-search" placeholder="Search by attacker, team, or url..."
                    style="padding: 10px 15px; background: #11111a; border: 1px solid rgba(0,255,204,0.2); color: var(--text-primary); font-family: var(--font-mono); font-size: 0.85rem; border-radius: 4px; outline: none; width: 280px;"
                    oninput="filterDefacements()">

                <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
                    <!-- Indonesia Priority -->
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="id-priority" onchange="filterDefacements()"
                            style="width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent-color);">
                        <label for="id-priority"
                            style="font-family: var(--font-mono); font-size: 0.75rem; color: #ff4d4d; cursor: pointer; display: flex; align-items: center; gap: 5px;">
                            <i class="fa-solid fa-flag"></i> INDONESIA PRIORITY
                        </label>
                    </div>

                    <!-- Date Dropdown -->
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <span
                            style="font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-secondary);">DATE:</span>
                        <select id="date-select" onchange="filterByDate(this.value)"
                            style="padding: 8px 12px; background: #11111a; border: 1px solid rgba(0,255,204,0.2); color: var(--accent-color); font-family: var(--font-mono); font-size: 0.8rem; border-radius: 4px; outline: none; min-width: 145px;">
                            <option value="all">ALL DATES</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="feed-status"
                style="font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 10px;">
            </div>

            <div class="table-container"
                style="max-height: 700px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.05); border-radius: 4px;">
                <table
                    style="width: 100%; border-collapse: collapse; font-size: 0.82rem; font-family: var(--font-mono);">
                    <thead>
                        <tr
                            style="border-bottom: 2px solid var(--accent-color); text-align: left; background: rgba(26, 26, 46, 0.95);">
                            <th
                                style="padding: 14px 15px; color: var(--accent-color); position: sticky; top: 0; background: inherit; z-index: 10;">
                                DATE & TIME</th>
                            <th
                                style="padding: 14px 15px; color: var(--accent-color); position: sticky; top: 0; background: inherit; z-index: 10;">
                                ATTACKER</th>
                            <th
                                style="padding: 14px 15px; color: var(--accent-color); position: sticky; top: 0; background: inherit; z-index: 10;">
                                TEAM</th>
                            <th
                                style="padding: 14px 15px; color: var(--accent-color); position: sticky; top: 0; background: inherit; z-index: 10;">
                                TARGET URL</th>
                            <th
                                style="padding: 14px 15px; color: var(--accent-color); position: sticky; top: 0; background: inherit; z-index: 10;">
                                COUNTRY</th>
                            <th
                                style="padding: 14px 15px; color: var(--accent-color); text-align: center; position: sticky; top: 0; background: inherit; z-index: 10;">
                                MIRROR</th>
                        </tr>
                    </thead>
                    <tbody id="defacement-tbody">
                        <tr>
                            <td colspan="6" style="padding: 60px 50px; text-align: center;">
                                <i class="fa-solid fa-microchip fa-fade" style="font-size: 2.5rem; color: var(--accent-color); margin-bottom: 20px;"></i>
                                <div style="color: var(--text-primary); font-family: var(--font-mono); font-size: 0.9rem; letter-spacing: 2px; margin-bottom: 15px; text-shadow: 0 0 10px rgba(0,255,204,0.3);">
                                    INITIALIZING PASSIVE INTELLIGENCE RETRIEVAL...
                                </div>
                                <div style="width: 280px; height: 4px; background: rgba(0,255,204,0.1); border-radius: 4px; margin: 0 auto; overflow: hidden; border: 1px solid rgba(0,255,204,0.2);">
                                    <div id="main-load-progress" style="width: 0%; height: 100%; background: var(--accent-color); box-shadow: 0 0 15px var(--accent-color); transition: width 0.4s ease;"></div>
                                </div>
                                <div id="main-load-status" style="color: var(--text-secondary); font-family: var(--font-mono); font-size: 0.7rem; margin-top: 10px; opacity: 0.6;">
                                    CONNECTING TO DATABASE...
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <style>
        .def-row {
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            transition: background 0.2s ease;
        }

        .def-row:hover {
            background: rgba(0, 255, 204, 0.04);
        }

        .attacker-name {
            color: var(--text-primary);
            font-weight: bold;
        }

        .team-badge {
            display: inline-block;
            padding: 2px 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            font-size: 0.7rem;
            color: var(--text-secondary);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .id-row {
            background: rgba(255, 68, 68, 0.05) !important;
        }

        .id-badge {
            background: #fff;
            color: #ff0000;
            padding: 1px 3px;
            border-radius: 2px;
            font-weight: bold;
            font-size: 0.65rem;
            border: 1px solid #ff0000;
            margin-right: 5px;
        }

        .mirror-link {
            color: var(--accent-color);
            opacity: 0.7;
            font-size: 1rem;
        }

        .mirror-link:hover {
            opacity: 1;
        }

        .mirror-btn {
            background: none;
            border: none;
            color: var(--accent-color);
            opacity: 0.7;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
            padding: 4px 6px;
        }

        .mirror-btn:hover {
            opacity: 1;
            transform: scale(1.15);
        }

        .spinning {
            animation: fa-spin 1s linear infinite;
        }

        /* Modal cards */
        .mir-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 255, 204, 0.1);
            border-radius: 6px;
            padding: 12px 14px;
    </style>

    <script>

        function loadDefacementFeed() {
            const tbody = document.getElementById('defacement-tbody');
            const status = document.getElementById('feed-status');
            const progBar = document.getElementById('main-load-progress');
            const loadStatus = document.getElementById('main-load-status');

            // --- Hacker-style Loading Animation ---
            let pWidth = 10;
            const statuses = [
                'RESOLVING DATABASE CLUSTER...',
                'HANDSHAKING WITH ZONE-XSEC MIRRORS...',
                'DECRYPTING EVIDENCE METADATA...',
                'PARSING VICTIM MANIFEST...',
                'FINALIZING INTEL STREAM...'
            ];
            let sIdx = 0;
            const interval = setInterval(() => {
                if (pWidth < 90) {
                    pWidth += Math.random() * 12;
                    if (progBar) progBar.style.width = pWidth + '%';
                    if (loadStatus && Math.random() > 0.7) {
                        loadStatus.innerText = statuses[sIdx % statuses.length];
                        sIdx++;
                    }
                }
            }, 500);

            fetch('/darkweb/defacements/feed')
                .then(r => r.json())
                .then(data => {
                    clearInterval(interval);
                    if (progBar) progBar.style.width = '100%';
                    if (loadStatus) loadStatus.innerText = 'DATA STREAM ESTABLISHED — RENDERING...';
                    
                    setTimeout(() => {
                        status.innerText = data.message || '';
                        if (data.results && data.results.length > 0) {
                            tbody.innerHTML = '';
                            const dates = new Set();
                        data.results.forEach(d => {
                            const isID = (d.country || '').toUpperCase() === 'ID' || (d.url || '').toLowerCase().includes('.id');
                            const row = document.createElement('tr');
                            row.className = 'def-row' + (isID ? ' id-row' : '');
                            row.dataset.country = isID ? 'ID' : (d.country || '');
                            const mirrorId = (d.mirror || '').split('/').pop();
                            row.dataset.mirrorId = mirrorId;
                            const dateKey = (d.date || '').split(' ')[0];
                            row.dataset.date = dateKey;
                            dates.add(dateKey);

                            const countryHtml = isID
                                ? `<span class="id-badge">ID</span><span style="color: #ff4d4d; font-weight: bold;">INDONESIA</span>`
                                : (d.country || '—');

                            const encAttacker = encodeURIComponent(d.attacker || '');
                            const encTeam = encodeURIComponent(d.team || '');
                            const encUrl = encodeURIComponent(d.url || '');
                            const encCountry = encodeURIComponent(d.country || '');
                            const fullTargetUrl = d.url.startsWith('http') ? d.url : `http://${d.url}`;

                            const preScrapedArgs = `'${d.ip || 'N/A'}', '${d.web_server || 'N/A'}'`;

                            const evidenceUrl = (d.mirror && d.mirror !== '#') ? d.mirror : fullTargetUrl;

                             row.innerHTML = `
                             <td style="padding: 12px 15px; color: var(--text-secondary); font-size: 0.75rem;">${d.date}</td>
                             <td style="padding: 12px 15px;" class="attacker-name">${d.attacker}</td>
                             <td style="padding: 12px 15px;" class="team-badge-cell"><span class="team-badge">${d.team || 'None'}</span></td>
                             <td style="padding: 12px 15px; color: var(--text-secondary); max-width: 450px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" class="target-url-cell">
                                 <a href="javascript:void(0)" 
                                    onclick="openMirrorModal('${mirrorId}', decodeURIComponent('${encAttacker}'), decodeURIComponent('${encTeam}'), decodeURIComponent('${encUrl}'), decodeURIComponent('${encCountry}'), '${d.date}', ${preScrapedArgs})"
                                    style="color: inherit; text-decoration: none;" title="View Passive Intel">
                                     <i class="fa-solid fa-eye" style="font-size: 0.7rem; opacity: 0.5; margin-right: 5px;"></i>${d.url}
                                 </a>
                             </td>
                             <td style="padding: 12px 15px;">${countryHtml}</td>
                             <td style="padding: 12px 15px; text-align: center;">
                                 <button class="mirror-btn" title="View Threat Intel"
                                     onclick="openMirrorModal('${mirrorId}', decodeURIComponent('${encAttacker}'), decodeURIComponent('${encTeam}'), decodeURIComponent('${encUrl}'), decodeURIComponent('${encCountry}'), '${d.date}', ${preScrapedArgs})"><i class="fa-solid fa-camera"></i></button>
                             </td>
                         `;
                            tbody.appendChild(row);
                        });

                        // Populate the date dropdown
                        const sel = document.getElementById('date-select');
                        sel.innerHTML = '<option value="all">ALL DATES</option>';
                        [...dates].sort().reverse().forEach(d => {
                            sel.innerHTML += `<option value="${d}">${d}</option>`;
                        });
                        } else {
                            tbody.innerHTML = `<tr><td colspan="6" style="padding: 40px; text-align: center; opacity:0.5;">No defacement records found. Click SYNC to fetch.</td></tr>`;
                        }
                    }, 400);
                })
                .catch(() => {
                    clearInterval(interval);
                    tbody.innerHTML = `<tr><td colspan="6" style="padding: 30px; text-align: center; color: var(--danger-color);">CONNECTION ERROR</td></tr>`;
                });
        }

        function filterDefacements() {
            const q = (document.getElementById('defacement-search').value || '').toLowerCase().trim();
            const idOnly = document.getElementById('id-priority').checked;
            const selectedDate = document.getElementById('date-select').value;

            document.querySelectorAll('.def-row').forEach(row => {
                const text = row.innerText.toLowerCase();
                const countryMatch = !idOnly || row.dataset.country === 'ID';
                const textMatch = !q || text.includes(q);
                const dateMatch = selectedDate === 'all' || row.dataset.date === selectedDate;
                row.style.display = (countryMatch && textMatch && dateMatch) ? '' : 'none';
            });
        }

        function filterByDate(val) {
            filterDefacements();
        }

        function syncDefacements() {
            const btn = document.getElementById('sync-btn');
            const icon = document.getElementById('sync-icon');
            const statusEl = document.getElementById('sync-status');

            btn.disabled = true;
            icon.classList.add('spinning');
            statusEl.style.display = 'block';
            statusEl.textContent = 'SCRAPING LATEST MIRRORS FROM SOURCES...';

            fetch('/darkweb/defacements/sync', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    btn.disabled = false;
                    icon.classList.remove('spinning');
                    if (data.success) {
                        statusEl.textContent = `✓ SYNC COMPLETE — ${data.new_records} records captured.`;
                        loadDefacementFeed();
                    } else {
                        statusEl.style.color = 'var(--danger-color)';
                        statusEl.textContent = `✗ SYNC FAILED: ${data.error}`;
                    }
                    setTimeout(() => { statusEl.style.display = 'none'; statusEl.style.color = ''; }, 5000);
                })
                .catch(() => {
                    btn.disabled = false;
                    icon.classList.remove('spinning');
                    statusEl.style.color = 'var(--danger-color)';
                    statusEl.textContent = '✗ CONNECTION ERROR';
                    setTimeout(() => { statusEl.style.display = 'none'; statusEl.style.color = ''; }, 4000);
                });
        }

        document.addEventListener('DOMContentLoaded', loadDefacementFeed);
    </script>
    {% endblock %}
