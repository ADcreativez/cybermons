{% extends 'base.html' %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div class="settings-card" style="width: 400px; text-align: center; border-top: 4px solid var(--primary-color);">
        <h2 style="color: var(--primary-color); margin-bottom: 20px;">
            <i class="fa-solid fa-user-shield"></i> MFA VERIFICATION
        </h2>
        <p style="opacity: 0.8; margin-bottom: 30px;">
            Please enter the 6-digit security code from your Authenticator app.
        </p>

        <form method="POST">
            <div style="margin-bottom: 30px;">
                <input type="text" name="token" placeholder="000000" maxlength="6" autofocus required
                    style="width: 100%; padding: 15px; background: rgba(0,0,0,0.3); border: 1px solid rgba(0,255,204,0.3); color: var(--primary-color); font-family: var(--font-mono); font-size: 2rem; text-align: center; letter-spacing: 10px; outline: none; border-radius: 4px;">
            </div>

            <button type="submit" class="btn-primary" style="width: 100%; padding: 15px; font-weight: bold;">
                VERIFY & LOGIN
            </button>
        </form>

        <div style="margin-top: 20px;">
            <a href="{{ url_for('auth.logout') }}"
                style="color: var(--danger-color); text-decoration: none; font-size: 0.9rem;">
                <i class="fa-solid fa-arrow-left"></i> Cancel and Logout
            </a>
        </div>
    </div>
</div>
{% endblock %}
